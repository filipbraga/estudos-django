<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Registro - Estudo Diário</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        h1 { color: #333; }
        .btn-salvar { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancelar { color: #666; text-decoration: none; margin-left: 15px; }
        form p { margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 8px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1> Novo Registro de Estudo</h1>
        <p>Preencha os detalhes da aula de hoje para sua base de conhecimento.</p>
        <hr>

        <form method="POST">
            {% csrf_token %} {{ form.as_p }} <br>
            <button type="submit" class="btn-salvar">Salvar Estudo</button>
            <a href="{% url 'home' %}" class="btn-cancelar">Cancelar</a>
        </form>
    </div>

</body>
</html>
